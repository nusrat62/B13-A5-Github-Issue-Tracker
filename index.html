<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
    .active-tab {
        background-color: #0969da; 
        color: white;
    }
    .tab-btn {
        transition: all 0.2s ease-in-out;
    }
</style>
</head>
<body class="bg-[#f8f9fc] text-slate-800 antialiased">

    <div id="login-page" class="min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 md:p-10 rounded-2xl shadow-sm w-full max-w-[440px] border border-gray-100 text-center">
            <div class="flex justify-center mb-6">
               <img src="/assets/github-logo.png" alt="GitHub Logo" class="w-12 h-12">
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900">GitHub Issues Tracker</h1>
            <p class="text-slate-500 mt-1 mb-8 text-sm">Sign in to manage your issues</p>
            
            <div class="text-left space-y-5">
                <div>
                    <label class="block font-medium text-sm text-slate-700 mb-1.5">Username</label>
                    <input type="text" id="user-input" placeholder="Enter Username" class="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 transition">
                    <p class="text-[10px] text-indigo-600 mt-1">Default: admin</p>
                </div>
                <div>
                    <label class="block font-medium text-sm text-slate-700 mb-1.5">Password</label>
                    <input type="password" id="pass-input" placeholder="Enter Password" class="w-full p-3 border border-slate-200 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 transition">
                    <p class="text-[10px] text-indigo-600 mt-1">Default: admin123</p>
                </div>
                <button onclick="handleLogin()" class="w-full bg-[#4c1dff] text-white py-3 rounded-lg font-bold text-sm shadow-md hover:bg-indigo-700 transition-all">Sign In</button>
            </div>
            <div class="mt-8 pt-6 border-t border-slate-100">
                <p class="text-xs text-slate-400 mb-4 uppercase tracking-widest font-bold">OR</p>
                <div class="bg-slate-50 p-4 rounded-lg text-sm">
                    <p class="text-slate-500 mb-1">Demo Credentials:</p>
                    <p class="font-bold text-slate-700">Username: <span class="font-normal">admin</span></p>
                    <p class="font-bold text-slate-700">Password: <span class="font-normal">admin123</span></p>
                </div>
            </div>
        </div>
    </div>

    <div id="main-page" class="hidden min-h-screen">
        <nav class="bg-white border-b sticky top-0 z-40 px-4 md:px-20 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <img src="/assets/github-logo.png" alt="GitHub Logo" class="w-6 h-6">
                <span class="font-bold text-lg text-slate-900">Issues Tracker</span>
            </div>
            <div class="flex gap-3 w-full md:w-auto">
                <div class="relative flex-grow md:w-80">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </span>
                    <input type="text" id="search-input" onkeyup="searchIssues()" placeholder="Search issues..." class="w-full border border-slate-200 pl-10 pr-4 py-2 rounded-lg outline-none focus:ring-1 focus:ring-indigo-500 text-sm">
                </div>
                <button class="bg-[#4c1dff] text-white px-4 py-2 rounded-lg font-bold text-sm shadow-md hover:bg-indigo-700">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-[1200px] mx-auto p-4 md:py-10">
           

            <div class="bg-white p-6 rounded-xl border border-slate-100 flex flex-col md:flex-row justify-between items-center mb-8 shadow-sm">
                <div class="flex items-center gap-4">
                    <div class="bg-indigo-50 p-3 rounded-full">
                        <img src="/assets/aperture.png" class="w-6 h-6"/>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900" id="issue-count">0 Issues</h2>
                        <p class="text-slate-400 text-sm">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-6 text-sm mt-4 md:mt-0">
                    <span class="flex items-center gap-2 font-medium text-slate-600"><span class="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> Open</span>
                    <span class="flex items-center gap-2 font-medium text-slate-600"><span class="w-2.5 h-2.5 bg-purple-500 rounded-full"></span> Closed</span>
                </div>
            </div>

            <div id="loader" class="hidden flex justify-center my-20">
                <div class="loader rounded-full border-4 border-slate-200 h-12 w-12"></div>
            </div>

            <div id="issues-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

 <div id="issue-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden flex items-center justify-center p-4 z-50">
    <div class="bg-white w-full max-w-2xl rounded-3xl p-10 shadow-2xl relative overflow-hidden">
        
        <div class="mb-8">
            <h2 id="modal-title" class="text-3xl font-extrabold text-slate-900 mb-4 leading-tight"></h2>
            <div class="flex items-center gap-3 flex-wrap">
                <span id="modal-status" class="px-4 py-1.5 rounded-full text-sm font-bold text-white shadow-sm"></span>
                <span id="modal-meta" class="text-sm text-slate-400 font-medium"></span>
            </div>
        </div>

        <div id="modal-labels" class="flex gap-2 mb-8"></div>

        <div class="mb-10">
            <p id="modal-desc" class="text-slate-600 text-base leading-relaxed"></p>
        </div>

        <div class="bg-slate-50/80 rounded-2xl p-6 grid grid-cols-2 gap-8 mb-10 border border-slate-100">
            <div>
                <p class="text-sm text-slate-400 font-medium mb-2">Assignee:</p>
                <p id="modal-author" class="text-xl font-bold text-slate-800"></p>
            </div>
            <div>
                <p class="text-sm text-slate-400 font-medium mb-2">Priority:</p>
                <span id="modal-priority" class="inline-block px-5 py-1.5 rounded-full text-sm font-black text-white uppercase tracking-wider"></span>
            </div>
        </div>

        <div class="flex justify-end">
            <button onclick="closeModal()" class="bg-[#4c1dff] hover:bg-[#3b15cc] text-white px-10 py-3 rounded-xl font-bold text-base shadow-lg transition-all active:scale-95">
                Close
            </button>
        </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
